\* Exception Propagation scenario configuration
CHECK_DEADLOCK FALSE
SPECIFICATION ExcPropSpec

CONSTANTS
  ActorPool    = {a1, a2, a3}
  Parent       = a1
  Child        = a2
  Sibling      = a3
  MessageIds   = {m1, m2}
  Payloads     = {p1, p2}
  TimeoutDelay = 2
  NoPending    = NoPending
  NoDeadline   = NoDeadline
  TimeoutToken = TimeoutToken

INVARIANTS
  DeadHaveReason
  LinkedActorGetsExitSignal
  MonitorGetsDownSignal
  ErrorReasonPreserved
  NormalReasonPreserved
  LinksCleanedAfterExit
