SPECIFICATION LinkPropagationSpec

CONSTANTS
  ActorPool = {a1, a2, a3}
  MessageIds = {m1, m2}
  Payloads = {1, 2}
  TimeoutDelay = 1
  Watcher = a1
  LinkedChild = a2
  MonitoredChild = a3

INVARIANTS
  TypeOK
  ReadyActorsAreLive
  LinksAreBidirectional
  LinksOnlyBetweenLive
  MonitorsOnlyFromLive
  DeadActorsHaveExitReason
  LiveActorsNoExitReason
  LinkedChildExitSignal
  MonitoredChildDownSignal
  LinksCleanedOnExit
  MonitorsCleanedOnExit
  NoSpuriousExitSignals
  NoSpuriousDownSignals

CHECK_DEADLOCK FALSE
