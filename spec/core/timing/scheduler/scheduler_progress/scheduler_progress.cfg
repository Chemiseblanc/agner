\* Scheduler progress scenario configuration
CHECK_DEADLOCK FALSE
SPECIFICATION SchedSpec

CONSTANTS
  ActorPool    = {a1, a2, a3}
  Worker1      = a1
  Worker2      = a2
  TimeoutWorker = a3
  MessageIds   = {m1, m2}
  Payloads     = {p1, p2}
  TimeoutDelay = 1

INVARIANTS
  TypeOK
  ReadyActorsAreLive
  PendingResultsAreReady
  TimerDiscipline
  SchedulerWitnessTypeOK
  ReadyActorsRemainLive
  RecordedDispatchIsReadyWorker
  TimeAdvanceWitnessConsistent
  TimeoutCompetitionWitnessConsistent

PROPERTIES
  EventuallyAdvanceWithReady
  EventuallyTimeoutReadyWithCompetition
