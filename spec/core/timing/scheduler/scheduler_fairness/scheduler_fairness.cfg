\* Scheduler Fairness scenario configuration
CHECK_DEADLOCK FALSE
SPECIFICATION SchedSpec

CONSTANTS
  ActorPool    = {a1, a2, a3}
  Worker1      = a1
  Worker2      = a2
  Worker3      = a3
  MessageIds   = {m1, m2}
  Payloads     = {p1, p2}
  TimeoutDelay = 2
  NoPending    = NoPending
  NoDeadline   = NoDeadline
  TimeoutToken = TimeoutToken

INVARIANTS
  ReadyQueueContainsLiveWorkers
  NoDuplicatesInQueue
  QueueWellFormed
  DispatchRecorded

CONSTRAINT
  BoundedRuns
