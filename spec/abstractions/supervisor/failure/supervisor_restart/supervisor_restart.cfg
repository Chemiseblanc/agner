SPECIFICATION SupervisorSpec

CONSTANTS
  ActorPool = {a1, a2, a3, a4, a5}
  MessageIds = {m1, m2}
  Payloads = {1, 2}
  TimeoutDelay = 1
  Sup = a1
  PermanentChild = a2
  TransientChild = a3
  TempChild = a4
  MaxRestarts = 2

INVARIANTS
  TypeOK
  ReadyActorsAreLive
  LinksAreBidirectional
  DeadActorsHaveExitReason
  LiveActorsNoExitReason
  PermanentChildAliveness
  IntensityLimitEnforced
  SupervisorLiveNoExit
  TransientNormalNotRestarted

CHECK_DEADLOCK FALSE
