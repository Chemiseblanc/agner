\* GenServer Call/Reply scenario configuration
CHECK_DEADLOCK FALSE
SPECIFICATION GenServerSpec

CONSTANTS
  ActorPool   = {a1, a2}
  Caller      = a1
  Server      = a2
  MessageIds  = {m1, m2, m3}
  Payloads    = {p1, p2}
  RequestIds   = {r1, r2}
  TimeoutDelay = 2
  NoPending    = NoPending
  NoDeadline   = NoDeadline
  TimeoutToken = TimeoutToken

INVARIANTS
  CallerTerminatesCorrectly
  ReplyMatchesRequest
  ExactlyOneOutcome
  ExactlyOneOutcomeTimeout
  NoWrongReplyAccepted
