SPECIFICATION ShutdownSuppressRestartSpec

CONSTANTS
  ChildIds = {c1, c2, c3}
  StrategyConst = "one_for_one"
  MaxRestarts = 3
  WithinWindow = 5
  ChildRestartPolicy = [c1 |-> "permanent", c2 |-> "permanent", c3 |-> "permanent"]
  ChildStartOrder = [c1 |-> 1, c2 |-> 2, c3 |-> 3]

INVARIANTS
  TypeOK
  NoRestartDuringShutdown

CHECK_DEADLOCK FALSE
