\* Coroutine Lifecycle scenario configuration
CHECK_DEADLOCK FALSE
SPECIFICATION CoroSpec

CONSTANTS
  ActorPool    = {a1, a2, a3}
  ParentTask   = a1
  ChildTask    = a2
  DetachedTask = a3
  MessageIds   = {m1, m2}
  Payloads     = {p1, p2}
  TimeoutDelay = 2
  NoPending    = NoPending
  NoDeadline   = NoDeadline
  TimeoutToken = TimeoutToken

INVARIANTS
  TasksStartSuspended
  RunningImpliesReady
  AwaitingNotReady
  ExclusiveOutcome
  ContinuationResumed
  DetachedCleanup
  CoroTypeOK
