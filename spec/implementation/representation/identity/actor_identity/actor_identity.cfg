\* Actor Identity scenario configuration
CHECK_DEADLOCK FALSE
SPECIFICATION IdentitySpec

CONSTANTS
  ActorPool    = {a1, a2, a3}
  MessageIds   = {m1, m2}
  Payloads     = {p1, p2}
  TimeoutDelay = 2
  NoPending    = NoPending
  NoDeadline   = NoDeadline
  TimeoutToken = TimeoutToken

INVARIANTS
  UniqueIds
  NoZeroId
  MonotoneCounter
  DeadActorsUnchanged
  DeadSendsNonNeg

CONSTRAINT
  Bound
